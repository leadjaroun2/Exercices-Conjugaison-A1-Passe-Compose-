<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Le Passé Composé</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1E3A8A; /* Bleu Foncé Classique */
            --accent: #3B82F6; /* Bleu Vif */
            --success: #10B981;
            --error: #EF4444;
            --bg: #F8FAFC;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #E2E8F0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-card {
            background: white;
            width: 95%;
            max-width: 800px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 40px;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .progress-container {
            flex-grow: 1;
            height: 8px;
            background: #EDF2F7;
            border-radius: 4px;
            margin: 0 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            width: 0%;
            transition: width 0.4s ease;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primary);
            font-size: 28px;
            margin: 0 0 10px 0;
        }

        .instruction-text {
            font-size: 15px;
            color: #475569;
            font-style: italic;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .question-box {
            background: var(--bg);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 6px solid var(--primary);
        }

        .question-text {
            font-size: 20px;
            font-weight: 600;
            color: #1E293B;
            margin-bottom: 5px;
        }

        .translation-hint {
            display: inline-block;
            margin-top: 8px;
            font-size: 14px;
            color: #64748B;
            cursor: pointer;
            text-decoration: underline dotted;
            user-select: none;
            transition: color 0.2s;
        }
        
        .translation-hint:hover {
            color: var(--accent);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
        }

        .option-btn {
            background: white;
            border: 2px solid #E2E8F0;
            padding: 18px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--accent);
            background: #F0F9FF;
        }

        .option-btn.correct {
            background-color: #D1FAE5;
            border-color: var(--success);
            color: #065F46;
        }

        .option-btn.incorrect {
            background-color: #FEE2E2;
            border-color: var(--error);
            color: #991B1B;
        }

        .feedback {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 700;
            display: none;
        }

        .next-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            display: none;
        }

        .next-btn:hover { 
            background: #12255B;
        }

        #result-screen { 
            text-align: center;
            display: none; 
        }
        .score-big { 
            font-size: 64px; 
            color: var(--primary); 
            font-weight: 800;
            margin: 20px 0; 
        }
    </style>
</head>
<body>

<div class="quiz-card">
    <div id="quiz-ui">
        <div class="header">
            <span id="q-count" style="font-weight: 600; color: #64748B;">Question 1/20</span>
            <div class="progress-container">
                <div class="progress-bar" id="p-bar"></div>
            </div>
            <span id="score-count" style="font-weight: 600; color: var(--primary);">Score: 0</span>
        </div>

        <h1>Le Passé Composé</h1>
        <div class="instruction-text" id="instruction-text">Choose the correct past tense form for the blank space.</div>
        
        <div class="question-box">
            <div class="question-text" id="q-text">Chargement...</div>
            <div class="translation-hint" id="q-trans" onclick="toggleTranslation()">👁 Show translation</div>
        </div>

        <div class="options-grid" id="options"></div>
        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">Question suivante →</button>
    </div>

    <div id="result-screen">
        <h1 id="res-title">Quiz Terminé !</h1>
        <div class="score-big" id="final-score">0 / 20</div>
        <p id="res-comment" style="font-size: 18px; margin-bottom: 30px;"></p>
        <button class="next-btn" style="display:block;" onclick="location.reload()">Recommencer / Restart</button>
    </div>
</div>

<script>
    // POOL DES 38 VERBES CONJUGUÉS AU PASSÉ COMPOSÉ
    const allVerbsPool = [
        // --- 1ER GROUPE (14 Verbes - Auxiliaire Avoir) ---
        { q: "Hier, vous _______ (travailler) toute la journée.", inst: "Regular -ER verb in past tense:", t: "Yesterday, you worked all day.", o: ["avez travaillé", "êtes travaillé", "avez travailler", "avez travaillés"], a: 0 },
        { q: "L'année dernière, vous _______ (étudier) le français.", inst: "Regular -ER verb in past tense:", t: "Last year, you studied French.", o: ["avez étudié", "êtes étudié", "avez étudiez", "ont étudié"], a: 0 },
        { q: "Ce midi, nous _______ (manger) au restaurant.", inst: "Regular -ER verb in past tense:", t: "This noon, we ate at the restaurant.", o: ["avons mangé", "sommes mangé", "avons manger", "avons mangés"], a: 0 },
        { q: "Pendant dix ans, j'_______ (habiter) à Londres.", inst: "Regular -ER verb in past tense:", t: "For ten years, I lived in London.", o: ["ai habité", "suis habité", "ai habiter", "as habité"], a: 0 },
        { q: "Ils _______ (aimer) beaucoup ce film.", inst: "Regular -ER verb in past tense:", t: "They liked this movie very much.", o: ["ont aimé", "ont aime", "sont aimé", "avez aimé"], a: 0 },
        { q: "J'_______ (adorer) mon voyage en Italie.", inst: "Regular -ER verb in past tense:", t: "I adored my trip to Italy.", o: ["ai adoré", "suis adoré", "ai adorer", "as adoré"], a: 0 },
        { q: "Elle _______ (détester) le cours d'histoire.", inst: "Regular -ER verb in past tense:", t: "She hated the history class.", o: ["a détesté", "est détesté", "a détester", "ont détesté"], a: 0 },
        { q: "La semaine passée, nous _______ (parler) avec le directeur.", inst: "Regular -ER verb in past tense:", t: "Last week, we spoke with the director.", o: ["avons parlé", "sommes parlé", "avons parlés", "avez parlé"], a: 0 },
        { q: "Elles _______ (regarder) un documentaire hier soir.", inst: "Regular -ER verb with feminine plural subject (no agreement with 'avoir' here!):", t: "They watched a documentary last night.", o: ["ont regardé", "ont regardées", "sont regardées", "ont regarder"], a: 0 },
        { q: "Ils _______ (écouter) les informations.", inst: "Regular -ER verb in past tense:", t: "They listened to the news.", o: ["ont écouté", "sont écoutés", "ont écoutés", "ont écouter"], a: 0 },
        { q: "Tu _______ (acheter) une nouvelle voiture ?", inst: "Regular -ER verb in past tense:", t: "Did you buy a new car?", o: ["as acheté", "es acheté", "as achète", "a acheté"], a: 0 },
        { q: "Tu _______ (payer) l'électricien ?", inst: "Regular -ER verb in past tense:", t: "Did you pay the electrician?", o: ["as payé", "es payé", "as payez", "a payé"], a: 0 },
        { q: "Elle _______ (chercher) ses lunettes partout.", inst: "Regular -ER verb in past tense:", t: "She looked for her glasses everywhere.", o: ["a cherché", "est cherché", "a cherchée", "ont cherché"], a: 0 },
        { q: "Enfin, nous _______ (trouver) la bonne adresse.", inst: "Regular -ER verb in past tense:", t: "Finally, we found the right address.", o: ["avons trouvé", "sommes trouvé", "avons trouvés", "avez trouvé"], a: 0 },

        // --- PRONOMINAUX / RÉFLEXIFS (10 Verbes - Auxiliaire Être & Accord obligatoire) ---
        { q: "Ils _______ (s'appeler) au téléphone hier.", inst: "Reflexive verb (Plural agreement with Être):", t: "They called each other on the phone yesterday.", o: ["se sont appelés", "ont appelé", "s'ont appelés", "se sont appelé"], a: 0 },
        { q: "Ce matin, je _______ (se réveiller) à 6h.", inst: "Reflexive verb in past tense:", t: "This morning, I woke up at 6 AM.", o: ["me suis réveillé", "ai réveillé", "m'ai réveillé", "me suis réveiller"], a: 0 },
        { q: "Tu _______ (se lever) très tard ce matin.", inst: "Reflexive verb in past tense:", t: "You got up very late this morning.", o: ["te es levé", "t'es levé", "as levé", "t'as levé"], a: 1 },
        { q: "Il _______ (se doucher) après le sport.", inst: "Reflexive verb in past tense:", t: "He took a shower after sports.", o: ["s'est douché", "a douché", "se douche", "s'a douché"], a: 0 },
        { q: "Marie _______ (s'habiller) rapidement.", inst: "Reflexive verb with a feminine singular subject (Watch the agreement!):", t: "Marie dressed quickly.", o: ["s'est habillée", "s'est habillé", "a habillé", "s'a habillée"], a: 0 },
        { q: "Tu _______ (se brosser) les dents.", inst: "Reflexive verb in past tense:", t: "You brushed your teeth.", o: ["t'es brossé", "as brossé", "te es brossé", "t'as brossé"], a: 0 },
        { q: "Vous _______ (se préparer) pour la fête.", inst: "Reflexive verb in past tense:", t: "You got ready for the party.", o: ["vous êtes préparés", "vous avez préparé", "vous êtes préparer", "se sont préparés"], a: 0 },
        { q: "Elle _______ (se reposer) tout l'après-midi.", inst: "Reflexive verb with feminine agreement:", t: "She rested all afternoon.", o: ["s'est reposée", "s'est reposé", "a reposé", "s'a reposée"], a: 0 },
        { q: "Je _______ (se coucher) à minuit.", inst: "Reflexive verb in past tense:", t: "I went to bed at midnight.", o: ["me suis couché", "ai couché", "me suis coucher", "m'ai couché"], a: 0 },
        { q: "Les enfants _______ (s'endormir) dans la voiture.", inst: "Reflexive verb with plural agreement:", t: "The children fell asleep in the car.", o: ["se sont endormis", "ont endormi", "se sont endormi", "s'ont endormis"], a: 0 },

        // --- 12 ESSENTIELS & AUTRES (Iréguliers - Mélange Avoir / Être) ---
        { q: "J'_______ (être) très surpris par la nouvelle.", inst: "Past participle of ÊTRE (uses Avoir!):", t: "I was very surprised by the news.", o: ["ai été", "suis été", "ai était", "as été"], a: 0 },
        { q: "Tu _______ (avoir) de la chance !", inst: "Past participle of AVOIR (uses Avoir!):", t: "You were lucky!", o: ["as eu", "as oit", "es eu", "a eu"], a: 0 },
        { q: "Elle _______ (aller) au supermarché.", inst: "Irregular verb using ÊTRE (Feminine agreement required):", t: "She went to the supermarket.", o: ["est allée", "a allé", "est allé", "ont allé"], a: 0 },
        { q: "Ils _______ (venir) nous rendre visite.", inst: "Irregular verb using ÊTRE (Plural agreement required):", t: "They came to visit us.", o: ["sont venus", "ont venu", "s'ont venus", "sont venu"], a: 0 },
        { q: "Nous _______ (faire) un gâteau au chocolat.", inst: "Irregular past participle of FAIRE:", t: "We made a chocolate cake.", o: ["avons fait", "sommes fait", "avons faits", "avez fait"], a: 0 },
        { q: "Qu'est-ce que vous _______ (dire) ?", inst: "Irregular past participle of DIRE:", t: "What did you say?", o: ["avez dit", "avez dites", "êtes dit", "ont dit"], a: 0 },
        { q: "Ils _______ (boire) un jus d'orange.", inst: "Irregular past participle of BOIRE:", t: "They drank an orange juice.", o: ["ont bu", "ont buvons", "sont bu", "ont bue"], a: 0 },
        { q: "Le voleur _______ (prendre) la fuite.", inst: "Irregular past participle of PRENDRE:", t: "The thief took flight / fled.", o: ["a pris", "est pris", "a prit", "ont pris"], a: 0 },
        { q: "Je _______ (vouloir) partir plus tôt.", inst: "Irregular past participle of VOULOIR:", t: "I wanted to leave earlier.", o: ["ai voulu", "suis voulu", "ai voulut", "as voulu"], a: 0 },
        { q: "Tu _______ (lire) ce livre ?", inst: "Irregular past participle of LIRE:", t: "Did you read this book?", o: ["as lu", "es lu", "as lut", "a lu"], a: 0 },
        { q: "Vous _______ (écrire) un e-mail important.", inst: "Irregular past participle of ÉCRIRE:", t: "You wrote an important email.", o: ["avez écrit", "êtes écrit", "avez écris", "avez écrira"], a: 0 },
        { q: "Nous _______ (voir) un bel arc-en-ciel.", inst: "Irregular past participle of VOIR:", t: "We saw a beautiful rainbow.", o: ["avons vu", "sommes vu", "avons vus", "avez vu"], a: 0 },
        
        // --- 2 AUTRES (Naître & Arriver - Auxiliaire Être obligatoire) ---
        { q: "Le célèbre poète _______ (naître) en 1802.", inst: "Irregular verb using ÊTRE:", t: "The famous poet was born in 1802.", o: ["est né", "a né", "est nait", "a nait"], a: 0 },
        { q: "Mes amis _______ (arriver) par le train de 14h.", inst: "Verb using ÊTRE (Plural agreement required):", t: "My friends arrived by the 2 PM train.", o: ["sont arrivés", "ont arrivé", "sont arrivé", "ont arrivés"], a: 0 }
    ];

    let quizQuestions = [];
    let currentIdx = 0;
    let score = 0;
    let translationVisible = false;

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function initQuiz() {
        let fullPool = JSON.parse(JSON.stringify(allVerbsPool));
        shuffleArray(fullPool);
        quizQuestions = fullPool.slice(0, 20); // Extrait 20 questions aléatoirement

        currentIdx = 0;
        score = 0;
        loadQ();
    }

    function loadQ() {
        const qData = quizQuestions[currentIdx];
        
        document.getElementById('instruction-text').innerText = qData.inst;
        document.getElementById('q-text').innerText = qData.q;
        
        translationVisible = false;
        document.getElementById('q-trans').innerText = "👁 Show translation";
        document.getElementById('q-trans').style.color = "#64748B";

        document.getElementById('q-count').innerText = `Question ${currentIdx + 1}/20`;
        document.getElementById('p-bar').style.width = ((currentIdx + 1) / 20 * 100) + "%";
        
        const correctText = qData.o[qData.a];
        
        let optionsMapped = qData.o.map((opt, index) => {
            return { text: opt, isCorrect: index === qData.a };
        });
        
        shuffleArray(optionsMapped);

        const optCont = document.getElementById('options');
        optCont.innerHTML = '';
        
        optionsMapped.forEach((opt) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => check(opt.isCorrect, btn, correctText);
            optCont.appendChild(btn);
        });
        
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function toggleTranslation() {
        const qData = quizQuestions[currentIdx];
        const transElement = document.getElementById('q-trans');
        if (!translationVisible) {
            transElement.innerText = `Meaning: "${qData.t}"`;
            transElement.style.color = "var(--accent)";
            translationVisible = true;
        } else {
            transElement.innerText = "👁 Show translation";
            transElement.style.color = "#64748B";
            translationVisible = false;
        }
    }

    function check(isCorrect, btn, correctText) {
        const all = document.querySelectorAll('.option-btn');
        all.forEach(b => b.disabled = true);

        const f = document.getElementById('feedback');
        f.style.display = 'block';

        const qData = quizQuestions[currentIdx];
        document.getElementById('q-trans').innerText = `Meaning: "${qData.t}"`;
        document.getElementById('q-trans').style.color = "var(--accent)";
        translationVisible = true;

        if(isCorrect) {
            btn.classList.add('correct');
            f.innerText = "Excellent ! Correct. ✅";
            f.style.color = "var(--success)";
            score++;
            document.getElementById('score-count').innerText = "Score: " + score;
        } else {
            btn.classList.add('incorrect');
            all.forEach(b => {
                if(b.innerText === correctText) b.classList.add('correct');
            });
            f.innerText = "Dommage ! La réponse était : " + correctText + " ❌";
            f.style.color = "var(--error)";
        }
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx < 20) loadQ();
        else showRes();
    }

    function showRes() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = score + " / 20";
        const comm = document.getElementById('res-comment');
        
        if(score === 20) comm.innerHTML = "Parfait ! Vous maîtrisez parfaitement le passé composé.<br><i>Perfect! You have a flawless mastery of the past tense.</i>";
        else if(score >= 14) comm.innerHTML = "Très bien ! Bon travail sur les choix d'auxiliaires et les accords.<br><i>Great job! Good command over auxiliary choices and agreements.</i>";
        else comm.innerHTML = "Continuez d'apprendre et de faire attention aux participes passés irréguliers !<br><i>Keep learning and pay attention to irregular past participles!</i>";
    }

    initQuiz();
</script>

</body>
</html>
