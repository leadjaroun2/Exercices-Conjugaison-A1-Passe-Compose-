<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz La Conjugaison au Présent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #003057; /* Bleu Marine Management */
            --accent: #00A9CE; /* Bleu Azur */
            --success: #27AE60;
            --error: #E74C3C;
            --bg: #F8FAFC;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #E2E8F0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-card {
            background: white;
            width: 95%;
            max-width: 800px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 40px;
            box-sizing: border-box;
        }

        /* Barre de progression */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .progress-container {
            flex-grow: 1;
            height: 8px;
            background: #EDF2F7;
            border-radius: 4px;
            margin: 0 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            width: 0%;
            transition: width 0.4s ease;
        }

        /* Zone Question et Instructions */
        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primary);
            font-size: 28px;
            margin: 0 0 10px 0;
        }

        .instruction-text {
            font-size: 15px;
            color: #475569;
            font-style: italic;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .question-box {
            background: var(--bg);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 6px solid var(--primary);
        }

        .question-text {
            font-size: 20px;
            font-weight: 600;
            color: #1E293B;
            margin-bottom: 5px;
        }

        /* Indication de traduction interactive */
        .translation-hint {
            display: inline-block;
            margin-top: 8px;
            font-size: 14px;
            color: #64748B;
            cursor: pointer;
            text-decoration: underline dotted;
            user-select: none;
            transition: color 0.2s;
        }
        
        .translation-hint:hover {
            color: var(--accent);
        }

        /* Boutons d'options */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
        }

        .option-btn {
            background: white;
            border: 2px solid #E2E8F0;
            padding: 18px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--accent);
            background: #F0F9FF;
        }

        .option-btn.correct {
            background-color: #D1FAE5;
            border-color: var(--success);
            color: #065F46;
        }

        .option-btn.incorrect {
            background-color: #FEE2E2;
            border-color: var(--error);
            color: #991B1B;
        }

        /* Feedback */
        .feedback {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 700;
            display: none;
        }

        .next-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            display: none;
        }

        .next-btn:hover { 
            background: #002340;
        }

        /* Ecran Final */
        #result-screen { 
            text-align: center;
            display: none; 
        }
        .score-big { 
            font-size: 64px; 
            color: var(--primary); 
            font-weight: 800;
            margin: 20px 0; 
        }
    </style>
</head>
<body>

<div class="quiz-card">
    <div id="quiz-ui">
        <div class="header">
            <span id="q-count" style="font-weight: 600; color: #64748B;">Question 1/20</span>
            <div class="progress-container">
                <div class="progress-bar" id="p-bar"></div>
            </div>
            <span id="score-count" style="font-weight: 600; color: var(--primary);">Score: 0</span>
        </div>

        <h1>Le Présent de l'Indicatif</h1>
        <div class="instruction-text" id="instruction-text">Choose the correct verb form for the blank space.</div>
        
        <div class="question-box">
            <div class="question-text" id="q-text">Chargement...</div>
            <div class="translation-hint" id="q-trans" onclick="toggleTranslation()">👁 Show translation</div>
        </div>

        <div class="options-grid" id="options"></div>
        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">Question suivante →</button>
    </div>

    <div id="result-screen">
        <h1 id="res-title">Quiz Terminé !</h1>
        <div class="score-big" id="final-score">0 / 20</div>
        <p id="res-comment" style="font-size: 18px; margin-bottom: 30px;"></p>
        <button class="next-btn" style="display:block;" onclick="location.reload()">Recommencer / Restart</button>
    </div>
</div>

<script>
    // LISTE TOTALE DES 38 VERBES DEMANDÉS
    const allVerbsPool = [
        // --- 1ER GROUPE (14 Verbes) ---
        { q: "Vous _______ (travailler) ici ?", inst: "Conjugate this regular -ER verb:", t: "Do you work here?", o: ["travaillez", "travailles", "travaille", "travaillent"], a: 0 },
        { q: "Vous _______ (étudier) beaucoup.", inst: "Conjugate this regular -ER verb:", t: "You study a lot.", o: ["étudiez", "étudies", "étudie", "étudient"], a: 0 },
        { q: "Nous _______ (manger) ensemble.", inst: "Watch out for the spelling change with 'Nous':", t: "We eat together.", o: ["mangeons", "mangons", "mangez", "mangent"], a: 0 },
        { q: "J'_______ (habiter) à Paris.", inst: "Conjugate this regular -ER verb starting with a silent H:", t: "I live in Paris.", o: ["habite", "habites", "habitons", "habitez"], a: 0 },
        { q: "Ils _______ (aimer) la musique.", inst: "Conjugate this regular -ER verb:", t: "They love/like music.", o: ["aiment", "aime", "aimez", "aimons"], a: 0 },
        { q: "J'_______ (adorer) le chocolat.", inst: "Conjugate this regular -ER verb:", t: "I adore chocolate.", o: ["adore", "adores", "adorez", "adorons"], a: 0 },
        { q: "Elle _______ (détester) les devoirs.", inst: "Conjugate this regular -ER verb:", t: "She hates homework.", o: ["déteste", "détestes", "détestent", "détestons"], a: 0 },
        { q: "Nous _______ (parler) français.", inst: "Conjugate this regular -ER verb:", t: "We speak French.", o: ["parlons", "parlez", "parlent", "parles"], a: 0 },
        { q: "Elles _______ (regarder) un film.", inst: "Conjugate this regular -ER verb:", t: "They are watching a movie.", o: ["regardent", "regarde", "regardes", "regardez"], a: 0 },
        { q: "Ils _______ (écouter) la radio.", inst: "Conjugate this regular -ER verb:", t: "They are listening to the radio.", o: ["écoutent", "écoute", "écoutes", "écoutez"], a: 0 },
        { q: "Tu _______ (acheter) un nouveau livre.", inst: "Watch out for the accent change in the root:", t: "You are buying a new book.", o: ["achètes", "achetes", "achète", "achetez"], a: 0 },
        { q: "Tu _______ (payer) l'addition.", inst: "Watch out for the vowel change (Y to I):", t: "You pay the bill.", o: ["paies", "payes", "paie", "payez"], a: 0 },
        { q: "Elle _______ (chercher) ses clés.", inst: "Conjugate this regular -ER verb:", t: "She is looking for her keys.", o: ["cherche", "cherches", "cherchons", "cherchent"], a: 0 },
        { q: "Nous _______ (trouver) une solution.", inst: "Conjugate this regular -ER verb:", t: "We find a solution.", o: ["trouvons", "trouvez", "trouve", "trouvent"], a: 0 },

        // --- REFLEXIVE / PRONOMINAUX (10 Verbes) ---
        { q: "Ils _______ (s'appeler) comment ?", inst: "Watch out for the double consonant and reflexive pronoun:", t: "What are their names?", o: ["s'appellent", "s'appelent", "t'appelles", "m'appelle"], a: 0 },
        { q: "Je _______ (se réveiller) à 7h.", inst: "Conjugate this reflexive verb:", t: "I wake up at 7 AM.", o: ["me réveille", "te réveilles", "se réveille", "nous réveillons"], a: 0 },
        { q: "Tu _______ (se lever) tôt.", inst: "Watch out for the accent change and pronoun:", t: "You get up early.", o: ["te lèves", "te leves", "me lève", "se lève"], a: 0 },
        { q: "Il _______ (se doucher) le matin.", inst: "Conjugate this reflexive verb:", t: "He takes a shower in the morning.", o: ["se douche", "me douche", "te douches", "se douchent"], a: 0 },
        { q: "Nous _______ (s'habiller) chaudement.", inst: "Watch out for the pronoun contraction with a vowel:", t: "We dress warmly.", o: ["nous habillons", "vous habillez", "s'habillent", "m'habille"], a: 0 },
        { q: "Tu _______ (se brosser) les dents.", inst: "Conjugate this reflexive verb:", t: "You brush your teeth.", o: ["te brosses", "me brosse", "se brosse", "vous brossez"], a: 0 },
        { q: "Vous _______ (se préparer) pour sortir.", inst: "Conjugate this reflexive verb:", t: "You are getting ready to go out.", o: ["vous préparez", "nous préparons", "se préparent", "te prépares"], a: 0 },
        { q: "Elle _______ (se reposer) dans le salon.", inst: "Conjugate this reflexive verb:", t: "She is resting in the living room.", o: ["se repose", "me repose", "te reposes", "se reposent"], a: 0 },
        { q: "Je _______ (se coucher) tard.", inst: "Conjugate this reflexive verb:", t: "I go to bed late.", o: ["me couche", "te couches", "se couche", "nous couchons"], a: 0 },
        { q: "Ils _______ (s'endormir) rapidement.", inst: "Conjugate this irregular reflexive verb:", t: "They fall asleep quickly.", o: ["s'endorment", "s'endormissent", "se dorment", "t'endors"], a: 0 },

        // --- 12 ESSENTIALS (12 Verbes) ---
        { q: "Je _______ (être) fatigué aujourd'hui.", inst: "Conjugate this essential irregular verb:", t: "I am tired today.", o: ["suis", "es", "est", "sommes"], a: 0 },
        { q: "Tu _______ (avoir) quel âge ?", inst: "Conjugate this essential irregular verb:", t: "How old are you?", o: ["as", "ai", "a", "avez"], a: 0 },
        { q: "Il _______ (aller) à la gare.", inst: "Conjugate this irregular verb:", t: "He goes to the station.", o: ["va", "vais", "vont", "allez"], a: 0 },
        { q: "Elle _______ (venir) demain.", inst: "Conjugate this irregular verb:", t: "She is coming tomorrow.", o: ["vient", "viens", "venons", "viennent"], a: 0 },
        { q: "Nous _______ (faire) du sport.", inst: "Conjugate this frequent irregular verb:", t: "We do sports.", o: ["faisons", "faites", "font", "fais"], a: 0 },
        { q: "Vous _______ (dire) la vérité.", inst: "Conjugate this frequent irregular verb:", t: "You tell the truth.", o: ["dites", "disons", "disez", "disent"], a: 0 },
        { q: "Nous _______ (boire) un verre d'eau.", inst: "Conjugate this irregular verb:", t: "We are drinking a glass of water.", o: ["buvons", "boivons", "boivent", "buvez"], a: 0 },
        { q: "Ils _______ (prendre) le train.", inst: "Conjugate this irregular verb:", t: "They take the train.", o: ["prennent", "prenent", "prend", "prenons"], a: 0 },
        { q: "Je _______ (vouloir) un café s'il vous plaît.", inst: "Conjugate this irregular modal verb:", t: "I want a coffee please.", o: ["veux", "veut", "voulons", "veulent"], a: 0 },
        { q: "Tu _______ (lire) un roman intéressant.", inst: "Conjugate this irregular verb:", t: "You are reading an interesting novel.", o: ["lis", "lit", "lisons", "lisez"], a: 0 },
        { q: "Vous _______ (écrire) un message.", inst: "Conjugate this irregular verb:", t: "You are writing a message.", o: ["écrivez", "écris", "écrivons", "écrivent"], a: 0 },
        { q: "Ils _______ (voir) la tour Eiffel.", inst: "Conjugate this irregular verb:", t: "They see the Eiffel Tower.", o: ["voient", "vois", "voit", "voyons"], a: 0 },

        // --- 2 OTHERS (2 Verbes) ---
        { q: "Un grand écrivain _______ (naître) aujourd'hui.", inst: "Conjugate this irregular verb:", t: "A great writer is born today.", o: ["naît", "nais", "naissent", "naissons"], a: 0 },
        { q: "Le train _______ (arriver) à l'heure.", inst: "Conjugate this regular -ER verb:", t: "The train arrives on time.", o: ["arrive", "arrives", "arrivent", "arrivons"], a: 0 }
    ];

    let quizQuestions = [];
    let currentIdx = 0;
    let score = 0;
    let translationVisible = false;

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function initQuiz() {
        // 1. Cloner la liste globale de tous les verbes (38)
        let fullPool = JSON.parse(JSON.stringify(allVerbsPool));
        
        // 2. Mélanger toute la liste
        shuffleArray(fullPool);
        
        // 3. Extraire uniquement 20 verbes au hasard pour la partie en cours
        quizQuestions = fullPool.slice(0, 20);

        currentIdx = 0;
        score = 0;
        loadQ();
    }

    function loadQ() {
        const qData = quizQuestions[currentIdx];
        
        document.getElementById('instruction-text').innerText = qData.inst;
        document.getElementById('q-text').innerText = qData.q;
        
        translationVisible = false;
        document.getElementById('q-trans').innerText = "👁 Show translation";
        document.getElementById('q-trans').style.color = "#64748B";

        document.getElementById('q-count').innerText = `Question ${currentIdx + 1}/20`;
        document.getElementById('p-bar').style.width = ((currentIdx + 1) / 20 * 100) + "%";
        
        const correctText = qData.o[qData.a];
        
        let optionsMapped = qData.o.map((opt, index) => {
            return { text: opt, isCorrect: index === qData.a };
        });
        
        shuffleArray(optionsMapped);

        const optCont = document.getElementById('options');
        optCont.innerHTML = '';
        
        optionsMapped.forEach((opt) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => check(opt.isCorrect, btn, correctText);
            optCont.appendChild(btn);
        });
        
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function toggleTranslation() {
        const qData = quizQuestions[currentIdx];
        const transElement = document.getElementById('q-trans');
        if (!translationVisible) {
            transElement.innerText = `Meaning: "${qData.t}"`;
            transElement.style.color = "var(--accent)";
            translationVisible = true;
        } else {
            transElement.innerText = "👁 Show translation";
            transElement.style.color = "#64748B";
            translationVisible = false;
        }
    }

    function check(isCorrect, btn, correctText) {
        const all = document.querySelectorAll('.option-btn');
        all.forEach(b => b.disabled = true);

        const f = document.getElementById('feedback');
        f.style.display = 'block';

        const qData = quizQuestions[currentIdx];
        document.getElementById('q-trans').innerText = `Meaning: "${qData.t}"`;
        document.getElementById('q-trans').style.color = "var(--accent)";
        translationVisible = true;

        if(isCorrect) {
            btn.classList.add('correct');
            f.innerText = "Excellent ! Correct. ✅";
            f.style.color = "var(--success)";
            score++;
            document.getElementById('score-count').innerText = "Score: " + score;
        } else {
            btn.classList.add('incorrect');
            all.forEach(b => {
                if(b.innerText === correctText) b.classList.add('correct');
            });
            f.innerText = "Dommage ! La réponse était : " + correctText + " ❌";
            f.style.color = "var(--error)";
        }
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx < 20) loadQ();
        else showRes();
    }

    function showRes() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = score + " / 20";
        const comm = document.getElementById('res-comment');
        
        if(score === 20) comm.innerHTML = "Parfait ! Vous maîtrisez les verbes essentiels de la conjugaison française.<br><i>Perfect! You have a flawless mastery of the essential verbs.</i>";
        else if(score >= 14) comm.innerHTML = "Très bien ! Bon travail sur les différents verbes et irrégularités.<br><i>Great job! Good command over verbs and irregularities.</i>";
        else comm.innerHTML = "Continuez d'apprendre et de pratiquer les verbes essentiels !<br><i>Keep learning and practicing essential verbs!</i>";
    }

    initQuiz();
</script>

</body>
</html>
